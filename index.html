<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبخ نشوى - المنيو الرقمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #ffb830; 
            --text-color: #ffffff;
            --text-muted: #a0a0a5;
            --glass-border: rgba(255, 255, 255, 0.08);
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- شاشة التحميل الذكية --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #060609;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #splash-logo {
            width: 170px;
            height: 170px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(255, 184, 48, 0.25);
            animation: luxuryIntro 2.5s forwards cubic-bezier(0.25, 1, 0.5, 1);
        }

        .progress-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #ffe699);
            box-shadow: 0 0 15px var(--accent-color);
            animation: advancedLoad 2.2s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        @keyframes luxuryIntro {
            0% { opacity: 0; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes advancedLoad { to { width: 100%; } }

        /* --- الشاشة الرئيسية للمنيو --- */
        #main-content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .hidden { display: none !important; }

        header {
            text-align: center;
            margin: 60px 0 20px 0;
        }

        .restaurant-name {
            font-size: 2.2rem;
            color: var(--accent-color);
            font-weight: 800;
        }

        /* سلة المشتريات العلوية */
        .cart-icon-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 99;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .cart-icon-container:active { transform: scale(0.85); }
        .cart-icon-container i { color: #fff; font-size: 1.3rem; }
        
        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--ios-red);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شريط الأقسام */
        .categories-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .category-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 30px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .category-btn.active {
            background: var(--text-color);
            color: #000;
            font-weight: bold;
            border-color: var(--text-color);
        }

        /* كروت الأصناف المحسنة */
        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .item-details { flex: 1; }
        .item-details h3 { font-size: 1.1rem; margin-bottom: 4px; color: #fff; text-align: right;}
        .item-details p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.4; text-align: right;}

        .item-actions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 4px 6px;
            border-radius: 10px;
            gap: 6px;
        }

        .size-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .price-text {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            white-space: nowrap;
        }

        /* زر طلب إنسيابي شبه الأيفون */
        .ios-order-btn {
            background: var(--ios-blue);
            color: #ffffff;
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            white-space: nowrap;
            transition: transform 0.1s ease;
        }
        .ios-order-btn:active {
            transform: scale(0.9) !important;
            background-color: #0062cc;
        }

        /* --- شاشة السلة المنفصلة بالكامل --- */
        #cart-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0b0b0f;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .cart-page-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .cart-page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .back-to-menu-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .cart-page-title { font-size: 1.5rem; font-weight: 700; }
        .cart-list { flex: 1; margin-bottom: 25px; }

        .cart-item-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-name { font-size: 1rem; font-weight: 600; margin-bottom: 4px; text-align: right; }
        .cart-item-price { color: var(--accent-color); font-size: 0.9rem; font-weight: bold; text-align: right; }

        .ios-delete-icon-btn {
            background: rgba(255, 59, 48, 0.1);
            color: var(--ios-red);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            cursor: pointer;
        }

        .total-summary-card {
            background: rgba(255, 184, 48, 0.05);
            border: 1px solid rgba(255, 184, 48, 0.15);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        .customer-inputs-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: right;
            margin-bottom: 35px;
        }

        .customer-inputs-group label { font-size: 0.9rem; color: var(--text-muted); }
        .customer-inputs-group input {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            text-align: right;
            outline: none;
        }

        .ios-checkout-action-btn {
            background: linear-gradient(90deg, var(--accent-color), #ffa500);
            color: #000;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 184, 48, 0.2);
        }

        .category-section { animation: fadeInSection 0.4s ease-in-out; }
        .hidden-section { display: none !important; }
        @keyframes fadeInSection { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="./loogoo.png" id="splash-logo" alt="لوجو مطبخ نشوى">
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="cart-icon-container" id="cart-trigger-btn" onclick="openCartPage(true)">
        <i class="fa-solid fa-bag-shopping"></i>
        <div class="cart-badge" id="global-badge-count" style="display: none;">0</div>
    </div>

    <main id="main-content" class="hidden">
        <header>
            <h1 class="restaurant-name">مطبخ نشوى</h1>
        </header>

        <nav class="categories-nav" id="categories-container"></nav>
        <section class="menu-section" id="menu-container"></section>
    </main>

    <div id="cart-page" class="hidden">
        <div class="cart-page-container">
            <div class="cart-page-header">
                <button class="back-to-menu-btn" onclick="openCartPage(false)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <div class="cart-page-title">سلة الطلبات</div>
            </div>

            <div class="cart-list" id="cart-page-list"></div>

            <div class="total-summary-card">
                <span>إجمالي الحساب:</span>
                <span id="cart-page-total">0 ج.م</span>
            </div>

            <div class="customer-inputs-group">
                <label for="user-name">اسم الزبون</label>
                <input type="text" id="user-name" placeholder="اكتب اسمك الثنائي">
                
                <label for="user-phone">رقم الهاتف</label>
                <input type="tel" id="user-phone" placeholder="رقم الموبايل الخاص بك">
                
                <label for="user-address">العنوان بالكامل</label>
                <input type="text" id="user-address" placeholder="المنطقة، الشارع، رقم الشقة أو البيت">
            </div>

            <button class="ios-checkout-action-btn" onclick="sendOrderViaWhatsApp()">تأكيد وإرسال الطلب</button>
        </div>
    </div>

    <script>
        let cart = [];

        window.addEventListener('DOMContentLoaded', () => {
            // كود إضافي للتأكد من امتداد الصورة لو مرفوعة jpg بدل png
            const imgEl = document.getElementById('splash-logo');
            imgEl.onerror = function() {
                if(!this.src.endsWith('jpg')) {
                    this.src = './loogoo.jpg';
                }
            };

            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const mainContent = document.getElementById('main-content');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                mainContent.classList.remove('hidden');
            }, 2500);

            fetchMenuData();
        });

        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN2hMpYgfUE_IZQkKuGFlgLbbxHgCNblTSdqSDD8_wxzORisUVLVI3_YdQ5OKMvDANSJ9jt3gU2uLR/pub?output=csv';

        // دالة ذكية تفك سطور الـ CSV حتى لو تحتوي على فواصل بداخل الوصف
        function parseCSVLine(text) {
            let p = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { r.push(p); p = ''; }
                else { p += c; }
            }
            r.push(p);
            return r;
        }

        async function fetchMenuData() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.text();
                
                // تقسيم السطور بناءً على نهاية السطر وتجنب المشاكل
                const lines = data.split(/\r?\n/);
                const categories = {};

                // تخطي العناوين والبدء من السطر الثاني
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    const row = parseCSVLine(lines[i]);
                    if (row.length < 2 || !row[0]) continue;

                    const category = row[0].trim();
                    const itemName = row[1] ? row[1].trim() : '';
                    const description = row[2] ? row[2].trim() : '';
                    const priceSmall = row[3] ? row[3].trim() : '';
                    const priceMedium = row[4] ? row[4].trim() : '';
                    const priceLarge = row[5] ? row[5].trim() : '';

                    if (!categories[category]) categories[category] = [];

                    categories[category].push({
                        name: itemName,
                        desc: description,
                        prices: { small: priceSmall, medium: priceMedium, large: priceLarge }
                    });
                }

                renderMenu(categories);
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        function renderMenu(categories) {
            const categoriesContainer = document.getElementById('categories-container');
            const menuContainer = document.getElementById('menu-container');
            
            categoriesContainer.innerHTML = '';
            menuContainer.innerHTML = '';

            const categoryKeys = Object.keys(categories);

            categoryKeys.forEach((category, index) => {
                const catButton = document.createElement('button');
                catButton.className = `category-btn ${index === 0 ? 'active' : ''}`;
                catButton.innerText = category;
                catButton.onclick = () => filterCategory(category, catButton);
                categoriesContainer.appendChild(catButton);

                const section = document.createElement('div');
                section.className = `category-section ${index === 0 ? '' : 'hidden-section'}`;
                section.id = `section-${category}`;

                categories[category].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'menu-card';
                    
                    let actionsHTML = '';
                    
                    // توليد الأزرار والأسعار بشكل سليم ومقاوم للأخطاء
                    if (item.prices.small && item.prices.small.trim() !== "") {
                        actionsHTML += `
                            <div class="price-row">
                                <span class="size-text">صغير:</span> 
                                <span class="price-text">${item.prices.small} ج</span>
                                <button class="ios-order-btn" onclick="addItemToCart('${item.name} (صغير)', ${item.prices.small})">طلب</button>
                            </div>`;
                    }
                    if (item.prices.medium && item.prices.medium.trim() !== "") {
                        actionsHTML += `
                            <div class="price-row">
                                <span class="size-text">وسط:</span> 
                                <span class="price-text">${item.prices.medium} ج</span>
                                <button class="ios-order-btn" onclick="addItemToCart('${item.name} (وسط)', ${item.prices.medium})">طلب</button>
                            </div>`;
                    }
                    if (item.prices.large && item.prices.large.trim() !== "") {
                        actionsHTML += `
                            <div class="price-row">
                                <span class="size-text">كبير:</span> 
                                <span class="price-text">${item.prices.large} ج</span>
                                <button class="ios-order-btn" onclick="addItemToCart('${item.name} (كبير)', ${item.prices.large})">طلب</button>
                            </div>`;
                    }

                    card.innerHTML = `
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <div class="item-actions-wrapper">
                            ${actionsHTML}
                        </div>
                    `;
                    section.appendChild(card);
                });
                menuContainer.appendChild(section);
            });
        }

        function filterCategory(category, button) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            document.querySelectorAll('.category-section').forEach(sec => sec.classList.add('hidden-section'));
            document.getElementById(`section-${category}`).classList.remove('hidden-section');
        }

        function addItemToCart(name, price) {
            const parsedPrice = parseFloat(price) || 0;
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ name, price: parsedPrice, qty: 1 });
            }
            refreshCartDisplay();
        }

        function removeItemFromCart(name) {
            cart = cart.filter(item => item.name !== name);
            refreshCartDisplay();
        }

        function refreshCartDisplay() {
            const globalBadge = document.getElementById('global-badge-count');
            const listPageContainer = document.getElementById('cart-page-list');
            const totalPageContainer = document.getElementById('cart-page-total');
            
            let totalItems = 0;
            let totalPrice = 0;
            listPageContainer.innerHTML = '';

            if (cart.length === 0) {
                listPageContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:40px;">السلة فارغة حالياً 🛒</div>`;
                globalBadge.style.display = 'none';
            } else {
                globalBadge.style.display = 'flex';
            }

            cart.forEach(item => {
                totalItems += item.qty;
                totalPrice += (item.price * item.qty);

                const rowCard = document.createElement('div');
                rowCard.className = 'cart-item-card';
                rowCard.innerHTML = `
                    <div>
                        <div class="cart-item-name">${item.name} <span style="color:var(--text-muted); font-size:0.85rem;">(x${item.qty})</span></div>
                        <div class="cart-item-price">${item.price * item.qty} ج.م</div>
                    </div>
                    <div>
                        <button class="ios-delete-icon-btn" onclick="removeItemFromCart('${item.name}')">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                listPageContainer.appendChild(rowCard);
            });

            globalBadge.innerText = totalItems;
            totalPageContainer.innerText = `${totalPrice} ج.م`;
        }

        function openCartPage(show) {
            const menuScreen = document.getElementById('main-content');
            const cartScreen = document.getElementById('cart-page');
            const cartTrigger = document.getElementById('cart-trigger-btn');

            if (show) {
                menuScreen.classList.add('hidden');
                cartTrigger.classList.add('hidden');
                cartScreen.classList.remove('hidden');
            } else {
                cartScreen.classList.add('hidden');
                menuScreen.classList.remove('hidden');
                cartTrigger.classList.remove('hidden');
            }
        }

        function sendOrderViaWhatsApp() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            const address = document.getElementById('user-address').value.trim();

            if (cart.length === 0) {
                alert('السلة فارغة تماماً! الرجاء اختيار طلباتك أولاً.');
                return;
            }
            if (!name || !phone || !address) {
                alert('برجاء ملء بياناتك كاملة (الاسم، الهاتف، العنوان) ليتم إرسال طلبك بنجاح.');
                return;
            }

            let orderText = `*طلب جديد من مطبخ نشوى*\n\n`;
            orderText += `*بيانات الزبون:*\n`;
            orderText += `👤 الاسم: ${name}\n`;
            orderText += `📞 الهاتف: ${phone}\n`;
            orderText += `📍 العنوان: ${address}\n\n`;
            orderText += `*الطلبات:*\n`;
            
            let total = 0;
            cart.forEach(item => {
                orderText += `- ${item.name} [العدد: ${item.qty}] -> ${item.price * item.qty} ج.م\n`;
                total += (item.price * item.qty);
            });
            
            orderText += `\n💰 *الإجمالي النهائي:* ${total} ج.م`;

            const encodedText = encodeURIComponent(orderText);
            window.open(`https://wa.me/201091560942?text=${encodedText}`, '_blank');
        }

        window.addEventListener('popstate', () => {
            window.history.pushState(null, null, window.location.pathname);
            const cartScreen = document.getElementById('cart-page');
            if (!cartScreen.classList.contains('hidden')) { openCartPage(false); }
        });
        window.history.pushState(null, null, window.location.pathname);
    </script>
</body>
</html>
